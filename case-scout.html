<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=DM+Sans&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #3E2723; /* Dark brown */
            color: #FFD54F; /* Gold */
            margin: 0;
            padding: 0;
        }
        nav {
            background-color: #4E342E;
            padding: 15px;
        }
        nav a {
            color: #FFD54F;
            padding: 10px;
            text-decoration: none;
        }
        .sidebar {
            width: 250px;
            float: left;
        }
        .content {
            margin-left: 260px;
            padding: 20px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.7.1/gsap.min.js"></script>
</head>
<body>
    <nav class="sidebar">
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#services">Services</a>
        <a href="#contact">Contact</a>
    </nav>
    <div class="content">
        <h1 style="font-family: 'Playfair Display', serif;">Welcome to My Portfolio</h1>
        <p>Applying the same design system from index.html.</p>
    </div>
    <script>
        gsap.from('.content', {duration: 1, x: -100, opacity: 0});
    </script>
</body>
</html>
